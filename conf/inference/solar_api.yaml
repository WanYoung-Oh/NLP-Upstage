defaults:
  - beam4

# inference_type н”Ңлһҳк·ёлЎң SolarAPIInferencerлҘј лӘ…мӢңм ҒмңјлЎң м„ нғқн•©лӢҲлӢӨ.
inference_type: "solar_api"

# Solar API м„Өм •
model_name: "solar-pro"
temperature: 0.1
top_p: 0.9
max_tokens: 150
prompt_style: "few_shot"  # zero_shot | few_shot | chain_of_thought
n_few_shot: 3
use_bm25: true  # BM25 кё°л°ҳ лҸҷм Ғ few-shot мҳҲм ң м„ нғқ
rate_limit_rpm: 100
result_path: "./prediction/"
output_filename: "output_solar.csv"
