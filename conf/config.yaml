defaults:
  - model: kobart
  - training: baseline
  - inference: beam4
  - _self_

general:
  data_path: "data"
  checkpoints_root: "checkpoints"   # train.py / GroupKFoldTrainer 공통 checkpoint 루트
  seed: 42

tokenizer:
  encoder_max_len: 512
  decoder_max_len: 100
  bos_token: "<s>"
  eos_token: "</s>"
  special_tokens:
    # 베이스라인 토큰
    - "#Person1#"
    - "#Person2#"
    - "#Person3#"
    - "#PhoneNumber#"
    - "#Address#"
    - "#PassportNumber#"
    # 추가 마스킹 토큰 (베이스라인 누락분)
    - "#DateOfBirth#"
    - "#SSN#"
    - "#CardNumber#"
    - "#CarNumber#"
    - "#Email#"

metrics:
  use_korouge: false   # true로 변경하면 korouge-score 사용 (Phase 3+, Java 불필요)

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
